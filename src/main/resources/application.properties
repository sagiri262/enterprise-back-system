# --- 基础配置 (Day1) ---
server.port=8080
spring.application.name=EnterpriseBackSystem

# --- Swagger / SpringDoc 配置 ---
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

springdoc.group-configs[0].group=demo
springdoc.group-configs[0].paths-to-match[0]=/api/demo/**

# Day2 新增的分组，方便调试
springdoc.group-configs[1].group=sys
springdoc.group-configs[1].paths-to-match[0]=/api/users/**

# --- 数据库连接配置 (Day2 新增) ---
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/enterprise_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
spring.datasource.username=root
spring.datasource.password=Zhaoyangmh@17

# --- MyBatis-Plus 配置 (Day2 新增) ---
# 开启驼峰命名映射 (database_field -> javaField)
mybatis-plus.configuration.map-underscore-to-camel-case=true
# 开发环境打印 SQL 日志 (生产环境建议关闭)
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# 逻辑删除配置 (0-未删 1-已删)
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0
